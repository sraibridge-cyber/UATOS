<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚛ UATOS — Universal AI Team Operating System v2.0</title>
  <meta name="description" content="Sovereign AI Team Operating System — Coherence-gated SCB pipeline with μ ≥ 0.9995">
  <style>
    /* ═══════════════════════════════════════════════════════
       UATOS v2.0 — Sovereign · Serverless · Cloudless · Vendorless
       Harmony Labs · Kyle S. Whitlock · Architect #88
    ═══════════════════════════════════════════════════════ */
    :root {
      --bg: #07091a;
      --bg2: #0d1330;
      --bg3: #111c45;
      --border: #1e2d5e;
      --text: #c8d8ff;
      --text2: #8aa4e0;
      --text3: #4a6080;
      --accent: #4f8fff;
      --accent2: #a855f7;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --r: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* ─── Header ─── */
    .uatos-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .sigil { font-size: 2rem; }
    h1 { font-size: 1.3rem; letter-spacing: .15em; color: var(--accent); margin: 0; }
    .sub { font-size: .65rem; color: var(--text3); letter-spacing: .08em; }
    .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .metrics-bar { display: flex; gap: 12px; }
    .met { display: flex; flex-direction: column; align-items: center; }
    .ml { font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
    .mv { font-size: 1rem; font-weight: 700; color: var(--green); }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-size: .7rem; color: var(--text2); }
    .sdot { width: 9px; height: 9px; border-radius: 50%; animation: sp 2s ease-in-out infinite; }
    .sdot.green { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .sdot.yellow { background: var(--yellow); box-shadow: 0 0 7px var(--yellow); }
    @keyframes sp { 0%,100% { opacity: 1 } 50% { opacity: .5 } }
    /* ─── Navigation ─── */
    .tab-nav {
      display: flex;
      gap: 3px;
      padding: 6px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text2);
      font-family: inherit;
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* ─── Main ─── */
    #main-content { flex: 1; padding: 16px; overflow-y: auto; }
    /* ─── Progress ─── */
    .progress-container {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .progress-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width .4s ease; }
    .progress-label { font-size: .7rem; color: var(--text2); min-width: 120px; }
    /* ─── Grid layouts ─── */
    .forge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .forge-grid { grid-template-columns: 1fr; } }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    /* ─── Panel ─── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      margin-bottom: 16px;
    }
    .ptitle { font-size: .85rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; letter-spacing: .06em; }
    /* ─── Forms ─── */
    label { display: block; font-size: .65rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; margin-top: 10px; }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; }
    /* ─── Buttons ─── */
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn {
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
      flex: 1;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #6ba3ff; }
    .btn-secondary { background: var(--bg3); color: var(--text2); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    .btn-accent { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .btn-accent:hover { background: #bf6fff; }
    /* ─── SCB List ─── */
    .scb-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
    .scb-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .scb-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .scb-id { font-size: .8rem; font-weight: 700; color: var(--accent); }
    .scb-ver { font-size: .65rem; color: var(--text3); }
    .scb-intent { font-size: .75rem; color: var(--text2); margin-bottom: 4px; }
    .scb-meta { font-size: .65rem; color: var(--text3); display: flex; gap: 6px; }
    .empty-state { font-size: .8rem; color: var(--text3); text-align: center; padding: 20px; }
    /* ─── Simulation Result ─── */
    .sim-result { margin-top: 12px; }
    .sim-grid { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .sim-metric { display: flex; flex-direction: column; align-items: center; background: var(--bg3); border-radius: 6px; padding: 8px 14px; min-width: 80px; }
    .sim-metric.pass { border: 1px solid var(--green); }
    .sim-metric.fail { border: 1px solid var(--red); }
    .sm-label { font-size: .6rem; color: var(--text3); text-transform: uppercase; }
    .sm-value { font-size: 1rem; font-weight: 700; }
    .sim-result-badge { padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: .8rem; }
    .sim-result-badge.allow { background: rgba(16,185,129,.2); color: var(--green); border: 1px solid var(--green); }
    .sim-result-badge.block { background: rgba(239,68,68,.2); color: var(--red); border: 1px solid var(--red); }
    .sim-chain { margin-top: 8px; font-size: .7rem; color: var(--text3); }
    /* ─── Team ─── */
    .team-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .2s;
    }
    .team-card:hover { border-color: var(--accent); }
    .team-card.standby { opacity: .7; }
    .team-icon { font-size: 1.8rem; }
    .team-name { font-size: .9rem; font-weight: 700; color: var(--accent); }
    .team-desc { font-size: .72rem; color: var(--text2); }
    .team-spec { font-size: .65rem; color: var(--text3); margin-top: 4px; }
    .team-status { display: flex; align-items: center; gap: 6px; font-size: .65rem; color: var(--text3); }
    .pulse-item { display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .72rem; }
    .pulse-time { color: var(--text3); font-size: .65rem; min-width: 140px; }
    .pulse-role { color: var(--accent); font-weight: 700; min-width: 80px; }
    .pulse-msg { color: var(--text2); }
    /* ─── Audit ─── */
    .audit-meta { display: flex; gap: 10px; font-size: .7rem; color: var(--text3); margin-bottom: 12px; }
    .audit-log { display: flex; flex-direction: column; gap: 4px; max-height: 400px; overflow-y: auto; }
    .audit-entry {
      display: flex;
      gap: 12px;
      padding: 8px 10px;
      background: var(--bg3);
      border-radius: 4px;
      font-size: .72rem;
      border-left: 3px solid var(--border);
    }
    .audit-entry.allow { border-left-color: var(--green); }
    .audit-entry.sealed { border-left-color: var(--accent2); }
    .audit-entry.block { border-left-color: var(--red); }
    .ae-seal { color: var(--accent); font-weight: 700; min-width: 140px; }
    .ae-time { color: var(--text3); min-width: 140px; }
    .ae-data { color: var(--text2); font-family: monospace; font-size: .65rem; }
    /* ─── DAG ─── */
    .dag-controls { display: flex; gap: 8px; margin-bottom: 14px; }
    .dag-canvas { min-height: 200px; }
    .dag-nodes { position: relative; }
    .dag-node {
      position: absolute;
      background: var(--bg3);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 10px 12px;
      min-width: 150px;
      font-size: .72rem;
    }
    .dn-id { font-weight: 700; color: var(--accent); font-size: .8rem; }
    .dn-intent { color: var(--text2); margin: 4px 0; }
    .dn-deps { color: var(--text3); font-size: .65rem; }
    /* ─── Metrics Grid ─── */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 12px; }
    .metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; }
    .metric-label { font-size: .6rem; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .metric-value { font-size: 1.4rem; font-weight: 700; }
    .metric-value.good { color: var(--green); }
    .metric-value.bad { color: var(--red); }
    /* ─── Pipeline ─── */
    .pipeline-result { margin-top: 12px; }
    .pipeline-result pre { background: var(--bg3); padding: 12px; border-radius: 6px; font-size: .7rem; overflow-x: auto; color: var(--text2); }
    /* ─── Footer ─── */
    .uatos-footer {
      padding: 10px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: center;
      font-size: .65rem;
      color: var(--text3);
      flex-wrap: wrap;
    }
    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent2);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .8rem;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(168,85,247,.4);
      display: none;
    }
    /* ─── Harmony Labs Badge ─── */
    .harmony-badge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: .6rem;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <div id="app">Loading UATOS v2.0...</div>
  <div class="harmony-badge">⚛ Harmony Labs · Sovereign · Serverless · Cloudless · Vendorless</div>
  <script src="js/app.js"></script>
</body>
</html>
